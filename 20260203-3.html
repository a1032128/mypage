<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch05. 表格(table)</title>
    <link rel="stylesheet" href="css/BS.css">
    <link rel="stylesheet" href="css/css02.css">
    <style>
        @media screen and (max-width: 768px) {
            .table-rwd thead{
                display: none;
            }
            
            .table-rwd tbody tr{
                display: block;
                border: 1px solid var(--BerryBlush);
                margin-top: 15px;
            }

            .table-rwd tbody tr td{
                display: block;
            }
            .table-rwd tbody tr td::before{
                content:attr(data-th)":";
                font: size 20px;
                font-weight: 400;
            }   
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-1 text-center">表格</div>
        <table class="table table-bordered table-striped table-hover table-rwd">
            <thead class="table-dark">
                <tr>
                    <th>商品編號</th>
                    <th>商品名稱</th>
                    <th>商品價格</th>
                    <th>商品數量</th>
                    <th>商品備註</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-th="商品編號">001</td>
                    <td data-th="商品名稱">美式咖啡</td>
                    <td data-th="商品價格">45</td>
                    <td data-th="商品數量">10</td>
                    <td data-th="商品備註">無糖</td>
                </tr>
                <tr>
                    <td data-th="商品編號">002</td>
                    <td data-th="商品名稱">拿鐵咖啡</td>
                    <td data-th="商品價格">65</td>
                    <td data-th="商品數量">10</td>
                    <td data-th="商品備註">無糖</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="js/BS.js"></script>
</body>
</html>
