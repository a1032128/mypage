<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html and CSS練習-hover</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: #FFFF00;
            border-radius: 5px;
            box-shadow: 2px 2px 2px 2px #CCccFF;
            box-sizing: border-box;
            color: blue;
            font-size: 15px;
            text-align: center;
            line-height:200px;
            margin:50px;
        }
        .box:hover{
            box-shadow: 5px 5px 5px 5px #070707;
            transform: scale(1.1);
            transition: transform 0.7s;
        }
    </style>
</head>

<body>
    <div class="box">
        . = class
        div=架構

    </div>

</body>

</html>
