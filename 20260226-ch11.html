<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ch11 表單</title>
    <link rel="stylesheet" href="CSS/BS.css">
    <link rel="stylesheet" href="CSS/css02.css">
</head>

<body>
    <div class="container pb5">
        <div class="display-3 p-3 my-4 fw-900 text-primary">Ch11表單相關應用</div>


        <div class="h2 py-3 fw-900 text-secondary">1.表單樣式(form)</div>
        <div class="row">
            <div class="col-12">
                <form action="" id="myFrom">
                    <div class="mb-3">
                        <label for="" class="form-label">帳號</label>
                        <input type="text" class="form-control" id="username01" placeholder="帳號最大6碼">
                        <div class="valid-feedback">輸入符合規定</div>
                        <div class="invalid-feedback">輸入不符合規定</div>
                    </div>

                    <div class="mb-3">
                        <label for="form-label">密碼</label>
                        <input type="password" class="form-control" name="" id="userpassword01" placeholder="密碼字數2~8">
                        <div class="valid-feedback">輸入符合規定</div>
                        <div class="invalid-feedback">輸入不符合規定</div>
                    </div>

                    <div class="mb-3">
                        <label for="form-label">Email</label>
                        <input type="email" class="form-control" name="" id="useremail01" placeholder="email字數2~10">
                        <div class="valid-feedback">輸入符合規定</div>
                        <div class="invalid-feedback">輸入不符合規定</div>
                    </div>

                    <button type="submit" class="btn btn-primary">送出</button>
                </form>
            </div>
        </div>

        <hr class="my-5">
        <div class="h2 py-3 fw-900 text-secondary">2.表單樣式(不使用form)</div>
        <div class="row">
            <div class="col-12">
                <div class="mb-3">
                    <label for="" class="form-label">帳號</label>
                    <input type="text" class="form-control" id="username02" placeholder="帳號字數1~6">
                    <div class="valid-feedback">輸入符合規定</div>
                    <div class="invalid-feedback">輸入不符合規定</div>
                </div>

                <div class="mb-3">
                    <label for="form-label">密碼</label>
                    <input type="password" class="form-control" name="" id="userpassword02" placeholder="密碼字數2~8">
                    <div class="valid-feedback">輸入符合規定</div>
                    <div class="invalid-feedback">輸入不符合規定</div>
                </div>

                <div class="mb-3">
                    <label for="form-label">Email</label>
                    <input type="email" class="form-control" name="" id="useremail02" placeholder="email字數2~10">
                    <div class="valid-feedback">輸入符合規定</div>
                    <div class="invalid-feedback">輸入不符合規定</div>
                </div>

                <button type="submit" class="btn btn-primary" id="btn02">送出</button>
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">3.select</div>
        <div class="row">
            <div class="col-12">
                <select name="" id="myCity" class="form-select-lg">
                    <option value="" class="text-center" disabled>**請選擇縣市**</option>
                    <option value="臺中市">臺中市</option>
                    <option value="臺北市">臺北市</option>
                    <option value="臺南市">臺南市</option>
                </select>
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">4.select練習</div>
        <div class="row">
            <div class="col-12">
                <select name="" id="myFood" class="form-select-lg">
                    <option value="" class="text-center" disabled>**請選擇菜單**</option>
                </select>
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">5.range</div>
        <div class="row">
            <div class="mb-3">
                <label for="" class="form-label">數量:<span class="text-success h2 fw-900"
                        id="num_text">50</span>個</label>
                <input type="range" class="form-range" min="0" max="100" step="1" id="num" value="50">
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">5.Datalist(串接後端推薦熱門食物)</div>
        <div class="row">
            <div class="mb-3">
                <label for="text" class="form-label">美食紀錄</label>
                <input type="text" class="form-control" list="foodlist">
                <datalist id="foodlist">
                    <option value="牛肉麵"></option>
                    <option value="炒飯"></option>
                    <option value="漢堡"></option>
                    <option value="可樂"></option>
                </datalist>
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">6.checkbox(複選)</div>
        <div class="row">
            <div class="col-12">
                <div class="form-check">
                    <input type="checkbox" name="sport" value="跑步" id="" class="form-check-input">
                    <label for="" class="form-check-label">跑步</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="sport" value="游泳" id="" class="form-check-input">
                    <label for="" class="form-check-label">游泳</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="sport" value="爬山" id="" class="form-check-input">
                    <label for="" class="form-check-label">爬山</label>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="sport" value="重訓" id="" class="form-check-input">
                    <label for="" class="form-check-label">重訓</label>
                </div>

                <button class="btn btn-success my-3" id="btn06">確認</button>
            </div>
        </div>

        <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">7.radio(單選)</div>
        <div class="row">
            <div class="col-12">
                <div class="form-check">
                    <input type="radio" name="edu" value="國中" id="" class="form-check-input">
                    <label for="" class="form-check-label">國中</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="edu" value="高中" id="" class="form-check-input">
                    <label for="" class="form-check-label">高中</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="edu" value="大學" id="" class="form-check-input">
                    <label for="" class="form-check-label">大學</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="edu" value="研究所(以上)" id="" class="form-check-input">
                    <label for="" class="form-check-label">研究所(以上)</label>
                </div>
            <button class="btn btn-success my-3" id="btn07">其他</button>
    </div>

    <hr class="mt-5">
        <div class="h2 py-3 fw-900 text-secondary">8.floating(漂浮表單)</div>
        <div class="row">
            <div class="col-12">
                <div class="mb-3 form-floating">
                <input type="text" class="form-control" name="" id="" placeholder="">
                <label for="" class="form-label">帳號</label>   
             </div>
        </div>
        </div>


    <script src="JS/BS.js"></script>
    <script src="JS/jquery-4.0.0.js"></script>
