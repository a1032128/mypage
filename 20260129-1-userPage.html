    <style>
        .section01 {
            background-color: var(--MangoGlow);
            height: 100vh;
            position: relative;
        }

        .section01 .box01 {
            width: 200px;
            height: 200px;
            background-color: var(--PopsicleSun);
            position: absolute;
            top: 0;
            left: 0;
        }

        .section01 .box02 {
            width: 200px;
            height: 200px;
            background-color: var(--PopsicleSun);
            position: absolute;
            top: 0;
            right: 0;
        }

        .section01 .box03 {
            width: 200px;
            height: 200px;
            background-color: var(--PopsicleSun);
            position: absolute;
            bottom: 0;
            left: 0;
        }

        .section01 .box04 {
            width: 200px;
            height: 200px;
            background-color: var(--PopsicleSun);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .userimg {
            position: absolute;
            top: 100px;
            bottom: 100px;
            left: 100px;
            right: 100px;
            background-color: var(--BlueberryNight);
            background-image: url(images_vsco/unnamed.jpg);
            background-size: cover;
            background-position: 30% 70%;
            opacity: 0.95;
        }

        .usertext {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--TropicalMist);
            background-color: rgba(0, 0, 0, 0.2);
            text-align: center;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 1px 1px 2px 1px var(--LeafWhisper);            
        }
        .usertext p{
            font-size: 24px;
        }

        .section02{
            position: relative;
            height: 400px;
            background-color: var(--IceCrystal);
        }

        .section02 .box01{
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--BerryBlush);
            border-radius: 50%;
            text-align: center;
            line-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .section02 .box01 a{
            text-decoration: none;  
            color: white;          
            font-size: 24px;
            font-weight: bold;
    
            display: flex;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>

    </div>
