        .section01 {
            background: linear-gradient(135deg, var(--bg-shore), var(--surface-emerging));
            height: 100vh;
            position: relative;
            border-bottom: 1px solid var(--border-faint);
        }

        .section01 .box01, .section01 .box02, .section01 .box03, .section01 .box04 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--PopsicleSun-accent), var(--CitrusSpark-accent));
            position: absolute;
            border-radius: 24px;
            box-shadow: 0 8px 24px var(--interact-glow);
            transition: all 0.4s ease;
        }

        .section01 .box01 { top: 0; left: 0; }
        .section01 .box02 { top: 0; right: 0; }
        .section01 .box03 { bottom: 0; left: 0; }
        .section01 .box04 { bottom: 0; right: 0; }

        .section01 .box01:hover { transform: scale(1.1) rotate(5deg); }
        .section01 .box02:hover { transform: scale(1.1) rotate(-5deg); }
        .section01 .box04:hover { transform: scale(1.1) rotate(-5deg); }
        .section01 .box03:hover { transform: scale(1.1) rotate(-5deg); }

        .userimg {
            position: absolute;
            top: 100px; bottom: 100px; left: 100px; right: 100px;
            background: linear-gradient(rgba(0,0,0,0.4), transparent), 
                        url('images_vsco/unnamed.jpg');
            background-size: cover;
            background-position: 30% 70%;
            border-radius: 24px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
        }

        .usertext {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-shore);
            background: rgba(23, 21, 22, 0.6);
            backdrop-filter: blur(12px);
            text-align: center;
            padding: 2rem;
            border-radius: 24px;
            border: 1px solid var(--border-present);
            box-shadow: 0 12px 32px var(--interact-glow);
        }
        .usertext h1 { @extend .title-1; margin-bottom: 1rem; }
        .usertext h2 { @extend .title-2; }
        .usertext p { 
            font-size: 1.25rem; 
            font-weight: 400;
            color: var(--text-readable);
            line-height: 1.6;
        }

        .section02 {
            position: relative;
            min-height: 500px;
            padding: 4rem 2rem;
            background: linear-gradient(180deg, var(--reading-bg), var(--reading-bg-elevated));
        }

        .section02 .box01 {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, var(--surface-emerging), var(--interact-rest));
            border-radius: 50%;
            display: grid;
            place-items: center;
            border: 2px solid var(--border-faint);
            transition: all 0.3s ease;
            margin: 1rem;
        }

        .section02 .box01:hover {
            background: var(--surface-hover);
            transform: scale(1.05);
            box-shadow: 0 12px 32px var(--interact-glow);
            border-color: var(--MangoGlow-accent);
        }

        .section02 .box01 a {
            text-decoration: none;
            color: var(--text-readable);
            font-size: 1.5rem;
            font-weight: 500;
            width: 70%;
            aspect-ratio: 1/1;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
