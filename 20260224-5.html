    <style>
        .bg-cover {
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            transition: transform 1s;
        }

        .pimg {
            height: 260px;
        }

        .timeline-section {
            position: relative;
        }

        .timeline-section::before {
            position: absolute;
            content: "";
            top: 0;
            bottom: 0;
            width: 3px;
            background-color: var(--BerryBlush);
            left: 50%;
            transform: translateX(-50%);
        }

        .timeline-section-pointer{
            position: relative;
            
        }

        .timeline-section-pointer::before {
            position: absolute;
            content: "";
            width: 24px;
            height: 24px;
            background-color: var(--LeafWhisper);
            border-radius: 50%;
            left: 50% ;
            transform: translateX(-50%);
            top:50%;
            border:6px solid var(--CitrusSpark);
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;

        }

        .timeline-section-pointer:hover::before{
            width: 32px;
            height: 32px;
        }

        @media screen and (max-width:768px) {
             .timeline-section::before , .timeline-section-pointer::before{
                display: none;
             }
        }
    </style>


</head>
